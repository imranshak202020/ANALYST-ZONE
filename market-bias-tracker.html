<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market Bias Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Noto+Sans+Bengali:wght@400;500;600&family=Crimson+Pro:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0f14;
  --panel:#12151c;
  --panel2:#171b24;
  --line:#242a35;
  --gold:#c9a84c;
  --gold-dim:#8a7539;
  --green:#4ecb71;
  --red:#e05252;
  --text:#e9e7de;
  --muted:#8b93a1;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--bg);}
body{font-family:'Crimson Pro',serif;color:var(--text);padding:24px 14px 60px;}
.page-wrap{max-width:900px;margin:0 auto;}
.page-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;}
.page-top a{color:var(--muted);text-decoration:none;font-family:'DM Mono',monospace;font-size:13px;border:1px solid var(--line);padding:7px 12px;border-radius:7px;}
.page-top a:hover{color:var(--text);border-color:var(--gold-dim);}
.page-top h1{font-family:'Playfair Display',serif;color:var(--gold);font-size:20px;margin:0;}
/* ===== Market Bias Tracker (scoped under #market-bias-app) ===== */
#market-bias-app{
  background:transparent;
  color:var(--text);
  font-family:'Crimson Pro',serif;
  padding:0;
}
#market-bias-app *{box-sizing:border-box;}
#market-bias-app .mb-wrap{max-width:900px;margin:0 auto;}

#market-bias-app header{
  display:flex;
  align-items:baseline;
  justify-content:space-between;
  flex-wrap:wrap;
  gap:10px;
  border-bottom:1px solid var(--line);
  padding-bottom:16px;
  margin-bottom:24px;
}
#market-bias-app h1{
  font-family:'Playfair Display',serif;
  font-weight:700;
  font-size:26px;
  color:var(--gold);
  letter-spacing:0.3px;
}
#market-bias-app .mb-subtitle{
  font-family:'Noto Sans Bengali','Crimson Pro',serif;
  color:var(--muted);
  font-size:14px;
}

#market-bias-app #dashboard-view .mb-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:14px;
  margin-bottom:20px;
}
#market-bias-app .mb-card{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:10px;
  padding:16px;
  cursor:pointer;
  transition:border-color .15s ease, transform .1s ease;
  position:relative;
  overflow:hidden;
}
#market-bias-app .mb-card:hover{border-color:var(--gold-dim);transform:translateY(-1px);}
#market-bias-app .mb-card .mb-asset-name{
  font-family:'Playfair Display',serif;
  font-size:19px;
  font-weight:600;
  color:var(--text);
  margin-bottom:8px;
}
#market-bias-app .mb-badge{
  display:inline-flex;
  align-items:center;
  gap:6px;
  font-family:'DM Mono',monospace;
  font-size:12px;
  letter-spacing:0.4px;
  padding:4px 9px;
  border-radius:20px;
  text-transform:uppercase;
}
#market-bias-app .mb-badge.up{background:rgba(78,203,113,0.12);color:var(--green);border:1px solid rgba(78,203,113,0.35);}
#market-bias-app .mb-badge.down{background:rgba(224,82,82,0.12);color:var(--red);border:1px solid rgba(224,82,82,0.35);}
#market-bias-app .mb-badge.side{background:rgba(201,168,76,0.12);color:var(--gold);border:1px solid rgba(201,168,76,0.35);}

#market-bias-app .mb-card .mb-meta{
  margin-top:10px;
  font-size:12.5px;
  color:var(--muted);
  font-family:'DM Mono',monospace;
}
#market-bias-app .mb-card .mb-note-preview{
  margin-top:8px;
  font-size:14px;
  color:var(--muted);
  font-family:'Noto Sans Bengali','Crimson Pro',serif;
  line-height:1.4;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
}
#market-bias-app .mb-card.empty{color:var(--muted);cursor:default;text-align:center;font-size:13px;font-family:'DM Mono',monospace;}

#market-bias-app .mb-card-del{
  display:none;
  position:absolute;
  top:10px;
  right:10px;
  width:24px;
  height:24px;
  border-radius:50%;
  background:transparent;
  border:1px solid var(--line);
  color:var(--muted);
  font-size:14px;
  line-height:1;
  padding:0;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}
#market-bias-app.mb-is-admin .mb-card-del{display:flex;}
#market-bias-app .mb-card-del:hover{color:var(--red);border-color:var(--red);background:rgba(224,82,82,0.1);}

#market-bias-app .mb-candle{width:10px;height:16px;position:relative;display:inline-block;}
#market-bias-app .mb-candle::before{content:'';position:absolute;left:50%;top:-3px;bottom:-3px;width:1px;background:currentColor;transform:translateX(-50%);}
#market-bias-app .mb-candle::after{content:'';position:absolute;left:0;right:0;top:4px;bottom:4px;background:currentColor;border-radius:1px;}

#market-bias-app .mb-add-asset-row{display:flex;gap:8px;margin-bottom:14px;}
#market-bias-app .mb-search-row{display:flex;gap:8px;margin-bottom:22px;position:relative;}
#market-bias-app .mb-search-row input{flex:1;padding-left:34px;}
#market-bias-app .mb-search-row .mb-search-icon{
  position:absolute;
  left:11px;
  top:50%;
  transform:translateY(-50%);
  color:var(--muted);
  font-size:14px;
  pointer-events:none;
}
#market-bias-app input,
#market-bias-app select,
#market-bias-app textarea{
  background:var(--panel2);
  border:1px solid var(--line);
  color:var(--text);
  border-radius:7px;
  padding:9px 11px;
  font-family:'Crimson Pro',serif;
  font-size:15px;
  outline:none;
}
#market-bias-app input:focus,
#market-bias-app select:focus,
#market-bias-app textarea:focus{border-color:var(--gold-dim);}
#market-bias-app .mb-add-asset-row input{flex:1;}

#market-bias-app button{
  background:var(--gold);
  color:#0d0f14;
  border:none;
  border-radius:7px;
  padding:9px 16px;
  font-family:'DM Mono',monospace;
  font-size:13px;
  font-weight:500;
  letter-spacing:0.3px;
  cursor:pointer;
  transition:opacity .15s ease;
}
#market-bias-app button:hover{opacity:0.85;}
#market-bias-app button.ghost{
  background:transparent;
  color:var(--muted);
  border:1px solid var(--line);
}
#market-bias-app button.ghost:hover{color:var(--text);border-color:var(--gold-dim);}

#market-bias-app #detail-view{display:none;}
#market-bias-app .mb-back-btn{margin-bottom:16px;}

#market-bias-app .mb-detail-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:18px;
  flex-wrap:wrap;
  gap:10px;
}
#market-bias-app .mb-detail-header h2{
  font-family:'Playfair Display',serif;
  color:var(--gold);
  font-size:24px;
}

#market-bias-app .mb-entry-form{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:10px;
  padding:18px;
  margin-bottom:24px;
}
#market-bias-app .mb-entry-form .mb-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px;}
#market-bias-app .mb-paste-zone{
  border:2px dashed var(--line);
  border-radius:8px;
  min-height:90px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:14px;
  cursor:pointer;
  color:var(--muted);
  font-size:13px;
  transition:border-color .15s, background .15s;
}
#market-bias-app .mb-paste-zone:hover,
#market-bias-app .mb-paste-zone:focus{
  border-color:var(--gold-dim);
  outline:none;
}
#market-bias-app .mb-paste-zone.mb-paste-zone-drag{
  border-color:var(--gold);
  background:rgba(201,168,76,.06);
}
#market-bias-app .mb-paste-zone img{
  max-width:100%;
  max-height:220px;
  border-radius:6px;
}
#market-bias-app .mb-entry-form .mb-row > *{flex:1;min-width:130px;}
#market-bias-app .mb-entry-form label{
  display:block;
  font-size:12px;
  font-family:'DM Mono',monospace;
  color:var(--muted);
  margin-bottom:4px;
}
#market-bias-app .mb-entry-form textarea{width:100%;min-height:70px;resize:vertical;font-family:'Noto Sans Bengali','Crimson Pro',serif;}
#market-bias-app .mb-bias-choice{display:flex;gap:8px;}
#market-bias-app .mb-bias-choice label{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  border:1px solid var(--line);
  border-radius:7px;
  padding:9px 6px;
  cursor:pointer;
  font-family:'DM Mono',monospace;
  font-size:12.5px;
  color:var(--muted);
}
#market-bias-app .mb-bias-choice input{display:none;}
#market-bias-app .mb-bias-choice input:checked + span{font-weight:600;}
#market-bias-app .mb-bias-choice label.up.active{border-color:var(--green);color:var(--green);background:rgba(78,203,113,0.08);}
#market-bias-app .mb-bias-choice label.down.active{border-color:var(--red);color:var(--red);background:rgba(224,82,82,0.08);}
#market-bias-app .mb-bias-choice label.side.active{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,0.08);}

#market-bias-app .mb-history{display:flex;flex-direction:column;gap:12px;}
#market-bias-app .mb-entry{
  background:var(--panel);
  border:1px solid var(--line);
  border-left:3px solid var(--gold-dim);
  border-radius:8px;
  padding:14px 16px;
}
#market-bias-app .mb-entry.up{border-left-color:var(--green);}
#market-bias-app .mb-entry.down{border-left-color:var(--red);}
#market-bias-app .mb-entry.side{border-left-color:var(--gold);}

#market-bias-app .mb-entry .mb-entry-top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:8px;}
#market-bias-app .mb-entry .mb-tf{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);}
#market-bias-app .mb-entry .mb-entry-actions{display:flex;gap:6px;margin-left:auto;}
#market-bias-app .mb-entry .mb-entry-actions button{
  background:transparent;
  border:1px solid var(--line);
  color:var(--muted);
  font-size:11px;
  padding:4px 9px;
  border-radius:6px;
}
#market-bias-app .mb-entry .mb-entry-actions button:hover{color:var(--text);border-color:var(--gold-dim);}
#market-bias-app .mb-entry .mb-entry-actions button.del:hover{color:var(--red);border-color:var(--red);}
#market-bias-app .mb-entry .mb-note{font-family:'Noto Sans Bengali','Crimson Pro',serif;font-size:15px;line-height:1.5;margin-bottom:8px;white-space:pre-wrap;}
#market-bias-app .mb-entry .mb-links{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
#market-bias-app .mb-entry a{color:var(--gold);font-family:'DM Mono',monospace;font-size:12.5px;text-decoration:none;border-bottom:1px dotted var(--gold-dim);}
#market-bias-app .mb-entry a:hover{color:#e0c878;}
#market-bias-app .mb-entry img{max-width:100%;border-radius:6px;margin-top:8px;border:1px solid var(--line);display:block;}
#market-bias-app .mb-entry .mb-ts{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);}

#market-bias-app .mb-empty-state{color:var(--muted);font-family:'DM Mono',monospace;font-size:13px;text-align:center;padding:30px 0;}
#market-bias-app .mb-status-msg{font-size:13px;font-weight:600;font-family:'DM Mono',monospace;color:var(--gold);margin-bottom:10px;min-height:16px;}
#market-bias-app .mb-admin-only{display:none;}
#market-bias-app.mb-is-admin .mb-admin-only{display:inline-flex;}
#market-bias-app.mb-is-admin .mb-add-asset-row.mb-admin-only{display:flex;}
#market-bias-app .mb-entry-form{display:none;}
#market-bias-app.mb-is-admin .mb-entry-form.mb-admin-only{display:none;}
#market-bias-app.mb-is-admin .mb-entry-form.mb-admin-only.mb-open{display:block;}
#market-bias-app .mb-add-bias-btn{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  width:100%;
  padding:12px;
  margin-bottom:18px;
  background:var(--gold);
  color:#0d0f14;
  border:none;
  border-radius:10px;
  font-family:'DM Mono',monospace;
  font-weight:700;
  font-size:13.5px;
  letter-spacing:0.3px;
  text-transform:uppercase;
  cursor:pointer;
}
#market-bias-app .mb-add-bias-btn:hover{filter:brightness(1.08);}
#market-bias-app.mb-is-admin .mb-add-bias-btn.mb-admin-only{display:flex;}
#market-bias-app .mb-add-bias-btn.mb-is-open{
  background:transparent;
  border:1px solid var(--line);
  color:var(--muted);
}
#market-bias-app .mb-viewer-note{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);margin-bottom:16px;}

</style>
</head>
<body data-page="market-bias">
<div class="page-wrap">
  <div class="page-top">
    <h1>Market Bias Tracker</h1>
    <a href="index.html">&larr; Home</a>
  </div>
    <div id="market-bias-app">
      <div class="mb-wrap">

        <div class="mb-viewer-note" id="mb-viewer-note" style="display:none;">Viewing live — only admin can add or edit notes.</div>

        <!-- DASHBOARD -->
        <div id="dashboard-view">
          <div class="mb-add-asset-row mb-admin-only">
            <input id="new-asset-input" type="text" placeholder="Add a new asset (e.g. BTC, XAUUSD, EURUSD)">
            <button onclick="mbAddAsset()">+ Add</button>
          </div>
          <div class="mb-status-msg" id="mb-dash-status"></div>
          <div class="mb-search-row">
            <span class="mb-search-icon">&#128269;</span>
            <input id="mb-asset-search-input" type="text" placeholder="Search assets (e.g. US30, NZDUSD...)">
          </div>
          <div class="mb-grid" id="mb-asset-grid"></div>
        </div>

        <!-- DETAIL -->
        <div id="detail-view">
          <button class="ghost mb-back-btn" onclick="mbShowDashboard()">← All Assets</button>
          <div class="mb-detail-header">
            <h2 id="mb-detail-asset-name"></h2>
            <span id="mb-detail-latest-badge"></span>
          </div>

          <button class="mb-add-bias-btn mb-admin-only" id="mb-add-entry-toggle-btn" onclick="mbToggleEntryForm()">+ Add Bias Note</button>

          <div class="mb-entry-form mb-admin-only" id="mb-entry-form-box">
            <div class="mb-row">
              <div>
                <label>Timeframe</label>
                <select id="mb-tf-select">
                  <option>1m</option>
                  <option>5m</option>
                  <option>15m</option>
                  <option>30m</option>
                  <option>1H</option>
                  <option>4H</option>
                  <option selected>Daily</option>
                  <option>Weekly</option>
                  <option>Month</option>
                </select>
              </div>
            </div>
            <div class="mb-row">
              <div class="mb-bias-choice">
                <label class="up" id="mb-bias-up-label"><input type="radio" name="mb-bias" value="up" checked><span>▲ Bullish</span></label>
                <label class="down" id="mb-bias-down-label"><input type="radio" name="mb-bias" value="down"><span>▼ Bearish</span></label>
                <label class="side" id="mb-bias-side-label"><input type="radio" name="mb-bias" value="side"><span>◆ Consolidation</span></label>
              </div>
            </div>
            <div class="mb-row">
              <div style="flex:1 1 100%;">
                <label>Note (why this bias — what happened on the candle)</label>
                <textarea id="mb-note-input" placeholder="e.g. Reaction from a bullish OB on Daily, CHoCH confirmed..."></textarea>
              </div>
            </div>
            <div class="mb-row">
              <div style="flex:1 1 100%;">
                <label>TradingView Link</label>
                <input id="mb-tv-link-input" type="url" placeholder="https://www.tradingview.com/x/...">
              </div>
            </div>
            <div class="mb-row">
              <div style="flex:1 1 100%;">
                <label>Chart Photo</label>
                <div id="mb-img-paste-zone" class="mb-paste-zone" tabindex="0">
                  <span id="mb-img-paste-hint">📋 এখানে ক্লিক করে Ctrl+V চাপুন — ছবি/স্ক্রিনশট পেস্ট করতে</span>
                  <img id="mb-img-preview" alt="preview" style="display:none;">
                </div>
                <input id="mb-img-link-input" type="text" placeholder="...অথবা এখানে ছবির লিংক (URL) পেস্ট করুন" style="margin-top:8px;">
                <div class="mb-status-msg" id="mb-img-paste-status"></div>
              </div>
            </div>
            <div class="mb-status-msg" id="mb-entry-status"></div>
            <div style="display:flex;gap:8px;">
              <button onclick="mbAddEntry()" id="mb-entry-submit-btn">Add Note</button>
              <button class="ghost" onclick="mbCancelEdit()" id="mb-entry-cancel-btn" style="display:none;">Cancel</button>
            </div>
          </div>

          <div class="mb-history" id="mb-history-list"></div>
        </div>

      </div>
    </div>
</div>
<script src="admin.js"></script>
<script>
// ===== Market Bias Tracker — Firestore-backed (uses db/auth from admin.js) =====
(function(){
  let mbAssets = {};      // { assetName: { entries: [...], addedAt: iso } }
  let mbCurrentAsset = null;
  let mbEditingId = null;
  let mbIsAdmin = false;
  let mbSubscribed = false;

  function mbBiasMeta(b){
    if(b==='up') return {label:'Bullish', cls:'up', arrow:'▲'};
    if(b==='down') return {label:'Bearish', cls:'down', arrow:'▼'};
    return {label:'Consolidation', cls:'side', arrow:'◆'};
  }

  function mbTimeAgo(iso){
    const d = new Date(iso);
    const diffMs = Date.now() - d.getTime();
    const mins = Math.floor(diffMs/60000);
    if(mins < 1) return 'just now';
    if(mins < 60) return mins+' min ago';
    const hrs = Math.floor(mins/60);
    if(hrs < 24) return hrs+' hr ago';
    const days = Math.floor(hrs/24);
    return days+' day(s) ago';
  }

  function mbFullTime(iso){
    const d = new Date(iso);
    return d.toLocaleString('en-GB',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
  }

  function mbNormalizeUrl(url){
    if(!url) return '';
    const trimmed = url.trim();
    if(/^data:/i.test(trimmed)) return trimmed;
    if(/^https?:\/\//i.test(trimmed)) return trimmed;
    return 'https://' + trimmed;
  }

  function mbShowImgPreview(src){
    const hint = document.getElementById('mb-img-paste-hint');
    const preview = document.getElementById('mb-img-preview');
    if(!hint || !preview) return;
    if(src){
      preview.src = src;
      preview.style.display = 'block';
      hint.style.display = 'none';
    } else {
      preview.src = '';
      preview.style.display = 'none';
      hint.style.display = 'block';
    }
  }

  (function setupMbImagePaste(){
    const zone = document.getElementById('mb-img-paste-zone');
    const linkInput = document.getElementById('mb-img-link-input');
    const statusEl = document.getElementById('mb-img-paste-status');
    if(!zone) return;

    function handleImageFile(file){
      if(!file) return;
      statusEl.textContent = 'ছবি প্রসেস হচ্ছে...';
      const reader = new FileReader();
      reader.onload = function(ev){
        const img = new Image();
        img.onload = function(){
          const maxW = 1000;
          const scale = Math.min(1, maxW / img.width);
          const canvas = document.createElement('canvas');
          canvas.width = Math.round(img.width * scale);
          canvas.height = Math.round(img.height * scale);
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
          linkInput.value = dataUrl;
          mbShowImgPreview(dataUrl);
          statusEl.textContent = 'ছবি যোগ হয়েছে — এবার নিচে Add Note চাপুন।';
        };
        img.onerror = function(){
          statusEl.textContent = 'ছবিটা পড়া যায়নি, আবার চেষ্টা করুন।';
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    }

    zone.addEventListener('click', function(){ zone.focus(); });

    zone.addEventListener('paste', function(e){
      const items = (e.clipboardData || window.clipboardData) ? (e.clipboardData || window.clipboardData).items : null;
      if(items){
        for(let i=0;i<items.length;i++){
          if(items[i].type && items[i].type.indexOf('image') !== -1){
            e.preventDefault();
            handleImageFile(items[i].getAsFile());
            return;
          }
        }
      }
      statusEl.textContent = 'কোনো ছবি পাওয়া যায়নি — আগে ছবিটা কপি করুন, তারপর এখানে Ctrl+V চাপুন।';
    });

    zone.addEventListener('dragover', function(e){ e.preventDefault(); zone.classList.add('mb-paste-zone-drag'); });
    zone.addEventListener('dragleave', function(){ zone.classList.remove('mb-paste-zone-drag'); });
    zone.addEventListener('drop', function(e){
      e.preventDefault();
      zone.classList.remove('mb-paste-zone-drag');
      if(e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0]){
        handleImageFile(e.dataTransfer.files[0]);
      }
    });
  })();

  function mbEscapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  // ---------- Firestore sync (so every visitor sees the same data) ----------
  function mbSubscribe(){
    if(!window.db || mbSubscribed) return;
    mbSubscribed = true;
    window.db.collection('marketBias').onSnapshot(function(snapshot){
      const loaded = {};
      snapshot.forEach(function(doc){
        const data = doc.data() || {};
        loaded[doc.id] = { entries: data.entries || [], addedAt: data.addedAt || '' };
      });
      mbAssets = loaded;
      mbRender();
    }, function(err){
      console.error('Failed to sync market bias with Firestore:', err);
    });
  }

  function mbRender(){
    if(mbCurrentAsset){
      mbRenderHistory();
    } else {
      mbRenderDashboard();
    }
  }

  function mbGetAssetNames(){
    return Object.keys(mbAssets).sort(function(a,b){
      return (mbAssets[b].addedAt||'').localeCompare(mbAssets[a].addedAt||'');
    });
  }

  async function mbAddAsset(){
    const input = document.getElementById('new-asset-input');
    const statusEl = document.getElementById('mb-dash-status');
    const name = input.value.trim().toUpperCase();
    if(!name){ statusEl.textContent = 'Please type an asset name first.'; return; }
    if(!mbIsAdmin || !window.__azEditMode){ statusEl.textContent = 'Enable Edit Mode first from the admin panel.'; return; }
    if(mbAssets[name]){
      statusEl.textContent = 'This asset is already added.';
      input.value='';
      return;
    }
    statusEl.textContent = 'Adding...';
    try{
      await window.db.collection('marketBias').doc(name).set({
        entries: [],
        addedAt: new Date().toISOString()
      });
      statusEl.textContent = '';
    }catch(e){
      console.error('Market Bias: could not save new asset:', e);
      statusEl.textContent = 'Could not save (' + (e && e.message ? e.message : 'unknown error') + ').';
    }
    input.value='';
  }

  function mbRenderDashboard(){
    const grid = document.getElementById('mb-asset-grid');
    if(!grid) return;
    const allNames = mbGetAssetNames();
    if(allNames.length === 0){
      grid.innerHTML = '<div class="mb-card empty">No assets added yet.<br>Add one above.</div>';
      return;
    }
    const searchEl = document.getElementById('mb-asset-search-input');
    const q = searchEl ? searchEl.value.trim().toUpperCase() : '';
    const names = q ? allNames.filter(a => a.includes(q)) : allNames;
    if(names.length === 0){
      grid.innerHTML = '<div class="mb-card empty">No assets match your search.</div>';
      return;
    }
    const cards = [];
    for(const asset of names){
      const entries = mbAssets[asset].entries || [];
      const latest = entries[0];
      let inner = '';
      if(latest){
        const bm = mbBiasMeta(latest.bias);
        inner = `
          <div class="mb-badge ${bm.cls}"><span class="mb-candle"></span>${bm.arrow} ${bm.label}</div>
          <div class="mb-meta">${latest.timeframe} · ${mbTimeAgo(latest.createdAt)}</div>
          <div class="mb-note-preview">${mbEscapeHtml(latest.note || '')}</div>
        `;
      } else {
        inner = `<div class="mb-meta">No notes yet</div>`;
      }
      cards.push(`
        <div class="mb-card" data-asset="${mbEscapeHtml(asset)}">
          <button class="mb-card-del" data-del-asset="${mbEscapeHtml(asset)}" title="Delete asset">&times;</button>
          <div class="mb-asset-name">${asset}</div>
          ${inner}
        </div>
      `);
    }
    grid.innerHTML = cards.join('');
  }

  // Event delegation for card clicks — safer than inline onclick (works even
  // if the asset name has special characters, and isn't blocked by strict CSP).
  document.addEventListener('click', function(e){
    const delAssetBtn = e.target.closest('[data-del-asset]');
    if(delAssetBtn){ mbDeleteAsset(delAssetBtn.dataset.delAsset); return; }
    const card = e.target.closest('#mb-asset-grid .mb-card');
    if(card && card.dataset.asset) mbOpenAsset(card.dataset.asset);
    const editBtn = e.target.closest('[data-edit-id]');
    if(editBtn) mbStartEdit(editBtn.dataset.editId);
    const delBtn = e.target.closest('[data-del-id]');
    if(delBtn) mbDeleteEntry(delBtn.dataset.delId);
  });

  function mbOpenAsset(asset){
    mbCurrentAsset = asset;
    mbEditingId = null;
    document.getElementById('dashboard-view').style.display = 'none';
    document.getElementById('detail-view').style.display = 'block';
    document.getElementById('mb-detail-asset-name').textContent = asset;
    mbUpdateBiasChoiceStyles();
    mbCloseEntryForm();
    mbRenderHistory();
  }

  function mbShowDashboard(){
    mbCurrentAsset = null;
    document.getElementById('detail-view').style.display = 'none';
    document.getElementById('dashboard-view').style.display = 'block';
    mbRenderDashboard();
  }

  document.addEventListener('input', function(e){
    if(e.target && e.target.id === 'mb-asset-search-input') mbRenderDashboard();
  });

  function mbOpenEntryForm(){
    const box = document.getElementById('mb-entry-form-box');
    const btn = document.getElementById('mb-add-entry-toggle-btn');
    if(box) box.classList.add('mb-open');
    if(btn){ btn.textContent = '− Close'; btn.classList.add('mb-is-open'); }
  }

  function mbCloseEntryForm(){
    const box = document.getElementById('mb-entry-form-box');
    const btn = document.getElementById('mb-add-entry-toggle-btn');
    if(box) box.classList.remove('mb-open');
    if(btn){ btn.textContent = '+ Add Bias Note'; btn.classList.remove('mb-is-open'); }
  }

  function mbToggleEntryForm(){
    const box = document.getElementById('mb-entry-form-box');
    if(!box) return;
    if(box.classList.contains('mb-open')){
      if(mbEditingId) mbCancelEdit();
      mbCloseEntryForm();
    } else {
      mbOpenEntryForm();
      box.scrollIntoView({behavior:'smooth', block:'start'});
    }
  }

  function mbUpdateBiasChoiceStyles(){
    document.querySelectorAll('input[name="mb-bias"]').forEach(r=>{
      r.addEventListener('change', ()=>{
        ['up','down','side'].forEach(b=>{
          document.getElementById('mb-bias-'+b+'-label').classList.remove('active');
        });
        document.getElementById('mb-bias-'+r.value+'-label').classList.add('active');
      });
    });
    document.getElementById('mb-bias-up-label').classList.add('active');
  }

  function mbRenderHistory(){
    const list = document.getElementById('mb-history-list');
    const badgeSlot = document.getElementById('mb-detail-latest-badge');
    if(!list || !mbCurrentAsset) return;
    const entries = (mbAssets[mbCurrentAsset] && mbAssets[mbCurrentAsset].entries) || [];
    if(entries.length === 0){
      list.innerHTML = '<div class="mb-empty-state">No notes yet — add the first one using the form above.</div>';
      badgeSlot.innerHTML = '';
      return;
    }
    const bm0 = mbBiasMeta(entries[0].bias);
    badgeSlot.innerHTML = `<div class="mb-badge ${bm0.cls}"><span class="mb-candle"></span>${bm0.arrow} ${bm0.label}</div>`;

    list.innerHTML = entries.map(e=>{
      const bm = mbBiasMeta(e.bias);
      let linksHtml = '';
      if(e.tvLink) linksHtml += `<a href="${mbNormalizeUrl(e.tvLink)}" target="_blank" rel="noopener">TradingView Link ↗</a>`;
      let imgHtml = '';
      if(e.imgUrl){
        imgHtml = /^data:/i.test(e.imgUrl)
          ? `<img src="${e.imgUrl}" alt="chart">`
          : `<a href="${mbNormalizeUrl(e.imgUrl)}" target="_blank" rel="noopener"><img src="${e.imgUrl}" alt="chart"></a>`;
      }
      const actionsHtml = (mbIsAdmin && window.__azEditMode) ? `
          <div class="mb-entry-actions">
            <button data-edit-id="${mbEscapeHtml(e.id)}">Edit</button>
            <button class="del" data-del-id="${mbEscapeHtml(e.id)}">Delete</button>
          </div>` : '';
      return `
        <div class="mb-entry ${bm.cls}">
          <div class="mb-entry-top">
            <div class="mb-badge ${bm.cls}"><span class="mb-candle"></span>${bm.arrow} ${bm.label}</div>
            <div class="mb-tf">${e.timeframe}</div>
            ${actionsHtml}
          </div>
          <div class="mb-note">${mbEscapeHtml(e.note || '')}</div>
          <div class="mb-links">
            ${linksHtml}
            <span class="mb-ts">${mbFullTime(e.createdAt)}</span>
          </div>
          ${imgHtml}
        </div>
      `;
    }).join('');
  }

  async function mbAddEntry(){
    const statusEl = document.getElementById('mb-entry-status');
    if(!mbIsAdmin || !window.__azEditMode){ statusEl.textContent = 'Enable Edit Mode first from the admin panel.'; return; }
    const timeframe = document.getElementById('mb-tf-select').value;
    const bias = document.querySelector('input[name="mb-bias"]:checked').value;
    const note = document.getElementById('mb-note-input').value.trim();
    const tvLink = document.getElementById('mb-tv-link-input').value.trim();
    const imgUrl = document.getElementById('mb-img-link-input').value.trim();

    if(!note){
      statusEl.textContent = 'Write a note — explain why this bias.';
      return;
    }

    statusEl.textContent = mbEditingId ? 'Updating...' : 'Saving...';
    const entries = ((mbAssets[mbCurrentAsset] && mbAssets[mbCurrentAsset].entries) || []).slice();

    if(mbEditingId){
      const idx = entries.findIndex(e => e.id === mbEditingId);
      if(idx !== -1){
        entries[idx] = { ...entries[idx], timeframe, bias, note, tvLink, imgUrl };
      }
    } else {
      entries.unshift({
        id: Date.now()+'-'+Math.random().toString(36).slice(2,7),
        timeframe, bias, note, tvLink, imgUrl,
        createdAt: new Date().toISOString()
      });
    }

    try{
      await window.db.collection('marketBias').doc(mbCurrentAsset).set({
        entries: entries,
        addedAt: (mbAssets[mbCurrentAsset] && mbAssets[mbCurrentAsset].addedAt) || new Date().toISOString()
      });
      statusEl.textContent = '';
      mbCancelEdit();
    }catch(e){
      console.error('Market Bias: could not save entry:', e);
      statusEl.textContent = 'Could not save (' + (e && e.message ? e.message : 'unknown error') + ').';
    }
  }

  function mbStartEdit(id){
    const entries = (mbAssets[mbCurrentAsset] && mbAssets[mbCurrentAsset].entries) || [];
    const entry = entries.find(e => e.id === id);
    if(!entry) return;
    mbEditingId = id;
    document.getElementById('mb-tf-select').value = entry.timeframe;
    document.querySelector(`input[name="mb-bias"][value="${entry.bias}"]`).checked = true;
    ['up','down','side'].forEach(b => document.getElementById('mb-bias-'+b+'-label').classList.remove('active'));
    document.getElementById('mb-bias-'+entry.bias+'-label').classList.add('active');
    document.getElementById('mb-note-input').value = entry.note || '';
    document.getElementById('mb-tv-link-input').value = entry.tvLink || '';
    document.getElementById('mb-img-link-input').value = entry.imgUrl || '';
    mbShowImgPreview(entry.imgUrl || '');
    document.getElementById('mb-entry-submit-btn').textContent = 'Update Note';
    document.getElementById('mb-entry-cancel-btn').style.display = 'inline-block';
    mbOpenEntryForm();
    document.querySelector('#market-bias-app .mb-entry-form').scrollIntoView({behavior:'smooth', block:'start'});
  }

  function mbCancelEdit(){
    mbEditingId = null;
    document.getElementById('mb-note-input').value = '';
    document.getElementById('mb-tv-link-input').value = '';
    document.getElementById('mb-img-link-input').value = '';
    mbShowImgPreview('');
    document.getElementById('mb-tf-select').value = 'Daily';
    document.querySelector('input[name="mb-bias"][value="up"]').checked = true;
    ['up','down','side'].forEach(b => document.getElementById('mb-bias-'+b+'-label').classList.remove('active'));
    document.getElementById('mb-bias-up-label').classList.add('active');
    document.getElementById('mb-entry-submit-btn').textContent = 'Add Note';
    document.getElementById('mb-entry-cancel-btn').style.display = 'none';
    document.getElementById('mb-entry-status').textContent = '';
    mbCloseEntryForm();
  }

  async function mbDeleteEntry(id){
    if(!mbIsAdmin || !window.__azEditMode) return;
    const entries = ((mbAssets[mbCurrentAsset] && mbAssets[mbCurrentAsset].entries) || []).filter(e => e.id !== id);
    try{
      await window.db.collection('marketBias').doc(mbCurrentAsset).set({
        entries: entries,
        addedAt: (mbAssets[mbCurrentAsset] && mbAssets[mbCurrentAsset].addedAt) || new Date().toISOString()
      });
      if(mbEditingId === id) mbCancelEdit();
    }catch(e){ /* ignore */ }
  }

  async function mbDeleteAsset(asset){
    if(!mbIsAdmin || !window.__azEditMode) return;
    if(!confirm(`Delete "${asset}" and all its bias notes? This can't be undone.`)) return;
    try{
      await window.db.collection('marketBias').doc(asset).delete();
      if(mbCurrentAsset === asset) mbShowDashboard();
    }catch(e){
      console.error('Market Bias: could not delete asset:', e);
      alert('Could not delete (' + (e && e.message ? e.message : 'unknown error') + ').');
    }
  }

  // expose for inline onclick handlers
  window.mbAddAsset = mbAddAsset;
  window.mbOpenAsset = mbOpenAsset;
  window.mbShowDashboard = mbShowDashboard;
  window.mbAddEntry = mbAddEntry;
  window.mbStartEdit = mbStartEdit;
  window.mbCancelEdit = mbCancelEdit;
  window.mbDeleteEntry = mbDeleteEntry;
  window.mbDeleteAsset = mbDeleteAsset;

  // ---------- Admin gating (mirrors trading_journal.html pattern) ----------
  function mbUpdateAdminUI(){
    const app = document.getElementById('market-bias-app');
    const note = document.getElementById('mb-viewer-note');
    const show = mbIsAdmin && !!window.__azEditMode;
    if(app) app.classList.toggle('mb-is-admin', show);
    if(note) note.style.display = show ? 'none' : '';
    mbRender();
  }

  document.addEventListener('az-editmode-changed', mbUpdateAdminUI);

  document.addEventListener('DOMContentLoaded', function(){
    mbUpdateBiasChoiceStyles();
    let tries = 0;
    const iv = setInterval(function(){
      tries++;
      if(typeof auth !== 'undefined' && auth){
        clearInterval(iv);
        auth.onAuthStateChanged(function(user){
          mbIsAdmin = !!(user && typeof ADMIN_EMAIL !== 'undefined' && user.email === ADMIN_EMAIL);
          mbUpdateAdminUI();
          if(typeof db !== 'undefined' && db){
            window.db = db;
            mbSubscribe();
          }
        });
      } else if(tries > 150){
        clearInterval(iv); // give up after ~15s if Firebase never loads
      }
    }, 100);
  });
})();

</script>
</script>
</body>
