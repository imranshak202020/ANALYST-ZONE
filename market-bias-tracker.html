<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market Bias Tracker</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Mono:wght@400;500&family=Noto+Sans+Bengali:wght@400;500;600&family=Crimson+Pro:ital,wght@0,400;0,500;1,400&display=swap');

:root{
  --bg:#0d0f14;
  --panel:#141821;
  --panel-2:#191d27;
  --border:#262c38;
  --gold:#c9a84c;
  --gold-dim:#8a763a;
  --green:#4ecb71;
  --red:#e05252;
  --text:#e9e6da;
  --text-dim:#8b8f9a;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Crimson Pro',serif;
  min-height:100vh;
  padding:24px 16px 60px;
}

.wrap{max-width:900px;margin:0 auto;}

header{
  display:flex;
  align-items:baseline;
  justify-content:space-between;
  flex-wrap:wrap;
  gap:10px;
  border-bottom:1px solid var(--border);
  padding-bottom:16px;
  margin-bottom:24px;
}

h1{
  font-family:'Playfair Display',serif;
  font-weight:700;
  font-size:26px;
  color:var(--gold);
  letter-spacing:0.3px;
}

.subtitle{
  font-family:'Noto Sans Bengali','Crimson Pro',serif;
  color:var(--text-dim);
  font-size:14px;
}

/* --- Dashboard grid --- */
#dashboard-view .grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:14px;
  margin-bottom:20px;
}

.card{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:10px;
  padding:16px;
  cursor:pointer;
  transition:border-color .15s ease, transform .1s ease;
  position:relative;
  overflow:hidden;
}
.card:hover{border-color:var(--gold-dim);transform:translateY(-1px);}

.card .asset-name{
  font-family:'Playfair Display',serif;
  font-size:19px;
  font-weight:600;
  color:var(--text);
  margin-bottom:8px;
}

.badge{
  display:inline-flex;
  align-items:center;
  gap:6px;
  font-family:'DM Mono',monospace;
  font-size:12px;
  letter-spacing:0.4px;
  padding:4px 9px;
  border-radius:20px;
  text-transform:uppercase;
}
.badge.up{background:rgba(78,203,113,0.12);color:var(--green);border:1px solid rgba(78,203,113,0.35);}
.badge.down{background:rgba(224,82,82,0.12);color:var(--red);border:1px solid rgba(224,82,82,0.35);}
.badge.side{background:rgba(201,168,76,0.12);color:var(--gold);border:1px solid rgba(201,168,76,0.35);}

.card .meta{
  margin-top:10px;
  font-size:12.5px;
  color:var(--text-dim);
  font-family:'DM Mono',monospace;
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
}

.tf-badge{
  display:inline-flex;
  align-items:center;
  font-family:'DM Mono',monospace;
  font-size:11.5px;
  font-weight:700;
  letter-spacing:0.4px;
  text-transform:uppercase;
  color:#0d0f14;
  background:#f4f2ea;
  border:1px solid #f4f2ea;
  border-radius:5px;
  padding:2px 8px;
}

.card .note-preview{
  margin-top:8px;
  font-size:14px;
  color:var(--text-dim);
  font-family:'Noto Sans Bengali','Crimson Pro',serif;
  line-height:1.4;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
}

.card.empty{color:var(--text-dim);cursor:default;text-align:center;font-size:13px;font-family:'DM Mono',monospace;}

.card .card-del{
  position:absolute;
  top:10px;
  right:10px;
  width:22px;
  height:22px;
  border-radius:50%;
  background:transparent;
  border:1px solid var(--border);
  color:var(--text-dim);
  font-size:13px;
  line-height:1;
  padding:0;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}
.card .card-del:hover{color:var(--red);border-color:var(--red);background:rgba(224,82,82,0.1);}

/* candle icon */
.candle{width:10px;height:16px;position:relative;display:inline-block;}
.candle::before{content:'';position:absolute;left:50%;top:-3px;bottom:-3px;width:1px;background:currentColor;transform:translateX(-50%);}
.candle::after{content:'';position:absolute;left:0;right:0;top:4px;bottom:4px;background:currentColor;border-radius:1px;}

/* --- Add asset --- */
.add-asset-row{display:flex;gap:8px;margin-bottom:14px;}
.search-row{display:flex;gap:8px;margin-bottom:22px;position:relative;}
.search-row input{flex:1;padding-left:34px;}
.search-row .search-icon{
  position:absolute;
  left:11px;
  top:50%;
  transform:translateY(-50%);
  color:var(--text-dim);
  font-size:14px;
  pointer-events:none;
}
input, select, textarea{
  background:var(--panel-2);
  border:1px solid var(--border);
  color:var(--text);
  border-radius:7px;
  padding:9px 11px;
  font-family:'Crimson Pro',serif;
  font-size:15px;
  outline:none;
}
input:focus, select:focus, textarea:focus{border-color:var(--gold-dim);}
.add-asset-row input{flex:1;}

button{
  background:var(--gold);
  color:#0d0f14;
  border:none;
  border-radius:7px;
  padding:9px 16px;
  font-family:'DM Mono',monospace;
  font-size:13px;
  font-weight:500;
  letter-spacing:0.3px;
  cursor:pointer;
  transition:opacity .15s ease;
}
button:hover{opacity:0.85;}
button.ghost{
  background:transparent;
  color:var(--text-dim);
  border:1px solid var(--border);
}
button.ghost:hover{color:var(--text);border-color:var(--gold-dim);}

/* --- Detail view --- */
#detail-view{display:none;}
.back-btn{margin-bottom:16px;}

.detail-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:18px;
  flex-wrap:wrap;
  gap:10px;
}
.detail-header h2{
  font-family:'Playfair Display',serif;
  color:var(--gold);
  font-size:24px;
}

.entry-form{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:10px;
  padding:18px;
  margin-bottom:24px;
  display:none;
}
.entry-form.open{ display:block; }
.add-bias-btn{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  width:100%;
  padding:12px;
  margin-bottom:18px;
  background:var(--gold);
  color:#0d0f14;
  border:none;
  border-radius:10px;
  font-family:'DM Mono',monospace;
  font-weight:700;
  font-size:13.5px;
  letter-spacing:0.3px;
  text-transform:uppercase;
  cursor:pointer;
}
.add-bias-btn:hover{ filter:brightness(1.08); }
.add-bias-btn.is-open{
  background:transparent;
  border:1px solid var(--border);
  color:var(--text-dim);
}
.entry-form .row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px;}
.entry-form .row > *{flex:1;min-width:130px;}
.entry-form label{
  display:block;
  font-size:12px;
  font-family:'DM Mono',monospace;
  color:var(--text-dim);
  margin-bottom:4px;
}
.entry-form textarea{width:100%;min-height:70px;resize:vertical;font-family:'Noto Sans Bengali','Crimson Pro',serif;}
.bias-choice{display:flex;gap:8px;}
.bias-choice label{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  border:1px solid var(--border);
  border-radius:7px;
  padding:9px 6px;
  cursor:pointer;
  font-family:'DM Mono',monospace;
  font-size:12.5px;
  color:var(--text-dim);
}
.bias-choice input{display:none;}
.bias-choice input:checked + span{font-weight:600;}
.bias-choice label.up.active{border-color:var(--green);color:var(--green);background:rgba(78,203,113,0.08);}
.bias-choice label.down.active{border-color:var(--red);color:var(--red);background:rgba(224,82,82,0.08);}
.bias-choice label.side.active{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,0.08);}

.history{display:flex;flex-direction:column;gap:12px;}
.entry{
  background:var(--panel);
  border:1px solid var(--border);
  border-left:3px solid var(--gold-dim);
  border-radius:8px;
  padding:14px 16px;
}
.entry.up{border-left-color:var(--green);}
.entry.down{border-left-color:var(--red);}
.entry.side{border-left-color:var(--gold);}

.entry .entry-top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:8px;}
.entry .tf{
  font-family:'DM Mono',monospace;
  font-size:11.5px;
  font-weight:700;
  letter-spacing:0.4px;
  text-transform:uppercase;
  color:#0d0f14;
  background:#f4f2ea;
  border:1px solid #f4f2ea;
  border-radius:5px;
  padding:2px 8px;
}
.entry .entry-actions{display:flex;gap:6px;margin-left:auto;}
.entry .entry-actions button{
  background:transparent;
  border:1px solid var(--border);
  color:var(--text-dim);
  font-size:11px;
  padding:4px 9px;
  border-radius:6px;
}
.entry .entry-actions button:hover{color:var(--text);border-color:var(--gold-dim);}
.entry .entry-actions button.del:hover{color:var(--red);border-color:var(--red);}
.entry .note{font-family:'Noto Sans Bengali','Crimson Pro',serif;font-size:15px;line-height:1.5;margin-bottom:8px;white-space:pre-wrap;}
.entry .links{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.entry a{color:var(--gold);font-family:'DM Mono',monospace;font-size:12.5px;text-decoration:none;border-bottom:1px dotted var(--gold-dim);}
.entry a:hover{color:#e0c878;}
.entry img{max-width:100%;border-radius:6px;margin-top:8px;border:1px solid var(--border);display:block;}
.entry .ts{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-dim);}

.empty-state{color:var(--text-dim);font-family:'DM Mono',monospace;font-size:13px;text-align:center;padding:30px 0;}
.status-msg{font-size:12px;font-family:'DM Mono',monospace;color:var(--text-dim);margin-bottom:10px;min-height:16px;}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div>
      <h1>Market Bias Tracker</h1>
      <div class="subtitle">BTC, ETH, Gold, Currency — trend and reasoning, all in one place</div>
    </div>
  </header>

  <!-- DASHBOARD -->
  <div id="dashboard-view">
    <div class="add-asset-row">
      <input id="new-asset-input" type="text" placeholder="Add a new asset (e.g. BTC, XAUUSD, EURUSD)">
      <button onclick="addAsset()">+ Add</button>
    </div>
    <div class="status-msg" id="dash-status"></div>
    <div class="search-row">
      <span class="search-icon">&#128269;</span>
      <input id="asset-search-input" type="text" placeholder="Search assets (e.g. US30, NZDUSD...)" oninput="renderDashboard()">
    </div>
    <div class="grid" id="asset-grid"></div>
  </div>

  <!-- DETAIL -->
  <div id="detail-view">
    <button class="ghost back-btn" onclick="showDashboard()">← All Assets</button>
    <div class="detail-header">
      <h2 id="detail-asset-name"></h2>
      <span id="detail-latest-badge"></span>
    </div>

    <button class="add-bias-btn" id="add-entry-toggle-btn" onclick="toggleEntryForm()">+ Add Bias Note</button>

    <div class="entry-form" id="entry-form-box">
      <div class="row">
        <div>
          <label>Timeframe</label>
          <select id="tf-select">
            <option>1m</option>
            <option>5m</option>
            <option>15m</option>
            <option>1H</option>
            <option>4H</option>
            <option selected>Daily</option>
            <option>Weekly</option>
          </select>
        </div>
      </div>
      <div class="row">
        <div class="bias-choice">
          <label class="up" id="bias-up-label"><input type="radio" name="bias" value="up" checked><span>▲ Bullish</span></label>
          <label class="down" id="bias-down-label"><input type="radio" name="bias" value="down"><span>▼ Bearish</span></label>
          <label class="side" id="bias-side-label"><input type="radio" name="bias" value="side"><span>◆ Consolidation</span></label>
        </div>
      </div>
      <div class="row">
        <div style="flex:1 1 100%;">
          <label>Note (why this bias — what happened on the candle)</label>
          <textarea id="note-input" placeholder="e.g. Reaction from a bullish OB on Daily, CHoCH confirmed..."></textarea>
        </div>
      </div>
      <div class="row">
        <div>
          <label>TradingView Link</label>
          <input id="tv-link-input" type="url" placeholder="https://www.tradingview.com/x/...">
        </div>
        <div>
          <label>Photo Link (chart screenshot URL)</label>
          <input id="img-link-input" type="url" placeholder="https://...">
        </div>
      </div>
      <div class="status-msg" id="entry-status"></div>
      <div style="display:flex;gap:8px;">
        <button onclick="addEntry()" id="entry-submit-btn">Add Note</button>
        <button class="ghost" onclick="cancelEdit()" id="entry-cancel-btn" style="display:none;">Cancel</button>
      </div>
    </div>

    <div class="history" id="history-list"></div>
  </div>

</div>

<script>
let currentAsset = null;
let editingId = null;

function biasMeta(b){
  if(b==='up') return {label:'Bullish', cls:'up', arrow:'▲'};
  if(b==='down') return {label:'Bearish', cls:'down', arrow:'▼'};
  return {label:'Consolidation', cls:'side', arrow:'◆'};
}

function timeAgo(iso){
  const d = new Date(iso);
  const diffMs = Date.now() - d.getTime();
  const mins = Math.floor(diffMs/60000);
  if(mins < 1) return 'just now';
  if(mins < 60) return mins+' min ago';
  const hrs = Math.floor(mins/60);
  if(hrs < 24) return hrs+' hr ago';
  const days = Math.floor(hrs/24);
  return days+' day(s) ago';
}

function fullTime(iso){
  const d = new Date(iso);
  return d.toLocaleString('en-GB',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
}

async function getAssets(){
  try{
    const res = await window.storage.get('assets-list', false);
    return res ? JSON.parse(res.value) : [];
  }catch(e){
    return [];
  }
}

async function saveAssets(list){
  try{
    await window.storage.set('assets-list', JSON.stringify(list), false);
    return true;
  }catch(e){
    return false;
  }
}

async function getEntries(asset){
  try{
    const res = await window.storage.get('entries:'+asset, false);
    return res ? JSON.parse(res.value) : [];
  }catch(e){
    return [];
  }
}

async function saveEntries(asset, entries){
  try{
    await window.storage.set('entries:'+asset, JSON.stringify(entries), false);
    return true;
  }catch(e){
    return false;
  }
}

async function deleteAsset(asset){
  const ok = confirm(`Delete "${asset}" and all its bias notes? This can't be undone.`);
  if(!ok) return;
  const assets = await getAssets();
  const filtered = assets.filter(a => a !== asset);
  const saved = await saveAssets(filtered);
  if(saved){
    try{ await window.storage.delete('entries:'+asset, false); }catch(e){ /* nothing to delete, fine */ }
    renderDashboard();
  }
}

async function addAsset(){
  const input = document.getElementById('new-asset-input');
  const statusEl = document.getElementById('dash-status');
  const name = input.value.trim().toUpperCase();
  if(!name){ return; }
  statusEl.textContent = 'Adding...';
  const assets = await getAssets();
  if(assets.includes(name)){
    statusEl.textContent = 'This asset is already added.';
    input.value='';
    return;
  }
  assets.unshift(name);
  const ok = await saveAssets(assets);
  statusEl.textContent = ok ? '' : 'Could not save, please try again.';
  input.value='';
  renderDashboard();
}

async function renderDashboard(){
  const grid = document.getElementById('asset-grid');
  grid.innerHTML = '<div class="card empty">Loading...</div>';
  const allAssets = await getAssets();
  if(allAssets.length === 0){
    grid.innerHTML = '<div class="card empty">No assets added yet.<br>Add one above.</div>';
    return;
  }
  const searchEl = document.getElementById('asset-search-input');
  const q = searchEl ? searchEl.value.trim().toUpperCase() : '';
  const assets = q ? allAssets.filter(a => a.includes(q)) : allAssets;
  if(assets.length === 0){
    grid.innerHTML = '<div class="card empty">No assets match your search.</div>';
    return;
  }
  const cards = [];
  for(const asset of assets){
    const entries = await getEntries(asset);
    const latest = entries[0];
    let inner = '';
    if(latest){
      const bm = biasMeta(latest.bias);
      inner = `
        <div class="badge ${bm.cls}"><span class="candle"></span>${bm.arrow} ${bm.label}</div>
        <div class="meta"><span class="tf-badge">${latest.timeframe}</span> · ${timeAgo(latest.createdAt)}</div>
        <div class="note-preview">${escapeHtml(latest.note || '')}</div>
      `;
    } else {
      inner = `<div class="meta">No notes yet</div>`;
    }
    cards.push(`
      <div class="card" onclick="openAsset('${asset}')">
        <button class="card-del" title="Delete asset" onclick="event.stopPropagation(); deleteAsset('${asset}')">&times;</button>
        <div class="asset-name">${asset}</div>
        ${inner}
      </div>
    `);
  }
  grid.innerHTML = cards.join('');
}

function normalizeUrl(url){
  if(!url) return '';
  const trimmed = url.trim();
  if(/^https?:\/\//i.test(trimmed)) return trimmed;
  return 'https://' + trimmed;
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function openAsset(asset){
  currentAsset = asset;
  editingId = null;
  document.getElementById('dashboard-view').style.display = 'none';
  document.getElementById('detail-view').style.display = 'block';
  document.getElementById('detail-asset-name').textContent = asset;
  updateBiasChoiceStyles();
  closeEntryForm();
  renderHistory();
}

function showDashboard(){
  currentAsset = null;
  document.getElementById('detail-view').style.display = 'none';
  document.getElementById('dashboard-view').style.display = 'block';
  renderDashboard();
}

function updateBiasChoiceStyles(){
  document.querySelectorAll('input[name="bias"]').forEach(r=>{
    r.addEventListener('change', ()=>{
      ['up','down','side'].forEach(b=>{
        document.getElementById('bias-'+b+'-label').classList.remove('active');
      });
      document.getElementById('bias-'+r.value+'-label').classList.add('active');
    });
  });
  document.getElementById('bias-up-label').classList.add('active');
}

async function renderHistory(){
  const list = document.getElementById('history-list');
  const badgeSlot = document.getElementById('detail-latest-badge');
  list.innerHTML = '<div class="empty-state">Loading...</div>';
  const entries = await getEntries(currentAsset);
  if(entries.length === 0){
    list.innerHTML = '<div class="empty-state">No notes yet — add the first one using the form above.</div>';
    badgeSlot.innerHTML = '';
    return;
  }
  const bm0 = biasMeta(entries[0].bias);
  badgeSlot.innerHTML = `<div class="badge ${bm0.cls}"><span class="candle"></span>${bm0.arrow} ${bm0.label}</div>`;

  list.innerHTML = entries.map(e=>{
    const bm = biasMeta(e.bias);
    let linksHtml = '';
    if(e.tvLink) linksHtml += `<a href="${normalizeUrl(e.tvLink)}" target="_blank" rel="noopener">TradingView Link ↗</a>`;
    let imgHtml = e.imgUrl ? `<a href="${normalizeUrl(e.imgUrl)}" target="_blank" rel="noopener"><img src="${e.imgUrl}" alt="chart"></a>` : '';
    return `
      <div class="entry ${bm.cls}">
        <div class="entry-top">
          <div class="badge ${bm.cls}"><span class="candle"></span>${bm.arrow} ${bm.label}</div>
          <div class="tf">${e.timeframe}</div>
          <div class="entry-actions">
            <button onclick="startEdit('${e.id}')">Edit</button>
            <button class="del" onclick="deleteEntry('${e.id}')">Delete</button>
          </div>
        </div>
        <div class="note">${escapeHtml(e.note || '')}</div>
        <div class="links">
          ${linksHtml}
          <span class="ts">${fullTime(e.createdAt)}</span>
        </div>
        ${imgHtml}
      </div>
    `;
  }).join('');
}

async function addEntry(){
  const statusEl = document.getElementById('entry-status');
  const timeframe = document.getElementById('tf-select').value;
  const bias = document.querySelector('input[name="bias"]:checked').value;
  const note = document.getElementById('note-input').value.trim();
  const tvLink = document.getElementById('tv-link-input').value.trim();
  const imgUrl = document.getElementById('img-link-input').value.trim();

  if(!note){
    statusEl.textContent = 'Write a note — explain why this bias.';
    return;
  }

  statusEl.textContent = editingId ? 'Updating...' : 'Saving...';
  const entries = await getEntries(currentAsset);

  if(editingId){
    const idx = entries.findIndex(e => e.id === editingId);
    if(idx !== -1){
      entries[idx] = { ...entries[idx], timeframe, bias, note, tvLink, imgUrl };
    }
  } else {
    entries.unshift({
      id: Date.now()+'-'+Math.random().toString(36).slice(2,7),
      timeframe, bias, note, tvLink, imgUrl,
      createdAt: new Date().toISOString()
    });
  }

  const ok = await saveEntries(currentAsset, entries);
  if(!ok){
    statusEl.textContent = 'Could not save, please try again.';
    return;
  }
  statusEl.textContent = '';
  cancelEdit();
  renderHistory();
}

function openEntryForm(){
  document.getElementById('entry-form-box').classList.add('open');
  const btn = document.getElementById('add-entry-toggle-btn');
  btn.textContent = '− Close';
  btn.classList.add('is-open');
}

function closeEntryForm(){
  document.getElementById('entry-form-box').classList.remove('open');
  const btn = document.getElementById('add-entry-toggle-btn');
  btn.textContent = '+ Add Bias Note';
  btn.classList.remove('is-open');
}

function toggleEntryForm(){
  const box = document.getElementById('entry-form-box');
  if(box.classList.contains('open')){
    if(editingId) cancelEdit();
    closeEntryForm();
  } else {
    openEntryForm();
    box.scrollIntoView({behavior:'smooth', block:'start'});
  }
}

async function startEdit(id){
  const entries = await getEntries(currentAsset);
  const entry = entries.find(e => e.id === id);
  if(!entry) return;
  editingId = id;
  document.getElementById('tf-select').value = entry.timeframe;
  document.querySelector(`input[name="bias"][value="${entry.bias}"]`).checked = true;
  ['up','down','side'].forEach(b => document.getElementById('bias-'+b+'-label').classList.remove('active'));
  document.getElementById('bias-'+entry.bias+'-label').classList.add('active');
  document.getElementById('note-input').value = entry.note || '';
  document.getElementById('tv-link-input').value = entry.tvLink || '';
  document.getElementById('img-link-input').value = entry.imgUrl || '';
  document.getElementById('entry-submit-btn').textContent = 'Update Note';
  document.getElementById('entry-cancel-btn').style.display = 'inline-block';
  openEntryForm();
  document.getElementById('entry-form-box').scrollIntoView({behavior:'smooth', block:'start'});
}

function cancelEdit(){
  editingId = null;
  document.getElementById('note-input').value = '';
  document.getElementById('tv-link-input').value = '';
  document.getElementById('img-link-input').value = '';
  document.getElementById('tf-select').value = 'Daily';
  document.querySelector('input[name="bias"][value="up"]').checked = true;
  ['up','down','side'].forEach(b => document.getElementById('bias-'+b+'-label').classList.remove('active'));
  document.getElementById('bias-up-label').classList.add('active');
  document.getElementById('entry-submit-btn').textContent = 'Add Note';
  document.getElementById('entry-cancel-btn').style.display = 'none';
  document.getElementById('entry-status').textContent = '';
  closeEntryForm();
}

async function deleteEntry(id){
  const entries = await getEntries(currentAsset);
  const filtered = entries.filter(e => e.id !== id);
  const ok = await saveEntries(currentAsset, filtered);
  if(ok){
    if(editingId === id) cancelEdit();
    renderHistory();
  }
}

renderDashboard();
</script>
